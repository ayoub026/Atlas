<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Pagina niet gevonden | Atlas</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0c6e82">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'%3E%3Crect width='44' height='44' rx='10' fill='%230c6e82'/%3E%3Ccircle cx='22' cy='22' r='13' stroke='white' stroke-opacity='0.5' stroke-width='1.8' fill='none'/%3E%3Cellipse cx='22' cy='22' rx='6.5' ry='13' stroke='white' stroke-opacity='0.45' stroke-width='1.8' fill='none'/%3E%3Cline x1='9' y1='22' x2='35' y2='22' stroke='white' stroke-opacity='0.4' stroke-width='1.8'/%3E%3Ccircle cx='22' cy='22' r='3' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#0c6e82;--teal3:#0e7490;
  --bg:#f8f6f2;--surface:#ffffff;
  --line:rgba(0,0,0,0.06);--line2:rgba(0,0,0,0.11);
  --text:#131210;--text2:#696660;--text3:#aeaba4;
  --font:'Inter',sans-serif;
}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background-image:radial-gradient(rgba(0,0,0,.045) 1px,transparent 1px);background-size:28px 28px;position:relative;overflow:hidden;}
.ambient{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse at 50% 30%,rgba(12,110,130,.09) 0%,transparent 60%);pointer-events:none;}
.logo-mark{width:64px;height:64px;border-radius:18px;background:linear-gradient(145deg,#0c6e82 0%,#0891b2 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 36px rgba(12,110,130,.32),0 4px 10px rgba(12,110,130,.2),inset 0 2px 2px rgba(255,255,255,.18);margin-bottom:28px;animation:floatLogo 5s ease-in-out infinite;}
@keyframes floatLogo{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@media(prefers-reduced-motion:reduce){.logo-mark{animation:none;}}
.error-code{font-size:clamp(100px,20vw,180px);font-weight:800;letter-spacing:-.08em;line-height:1;color:transparent;background:linear-gradient(135deg,var(--line2) 0%,rgba(0,0,0,.04) 100%);-webkit-background-clip:text;background-clip:text;margin-bottom:4px;user-select:none;}
.error-title{font-size:clamp(18px,3vw,26px);font-weight:700;letter-spacing:-.03em;color:var(--text);margin-bottom:12px;}
.error-sub{font-size:15px;color:var(--text2);line-height:1.65;max-width:380px;text-align:center;margin-bottom:36px;}
.actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;}
.btn-home{padding:0 26px;height:46px;font-size:13.5px;font-weight:600;background:var(--teal);color:#fff;border:none;border-radius:24px;cursor:pointer;font-family:var(--font);text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .2s;box-shadow:0 4px 18px rgba(12,110,130,.32),0 1px 3px rgba(12,110,130,.18);}
.btn-home:hover{background:var(--teal3);transform:translateY(-2px);box-shadow:0 8px 28px rgba(12,110,130,.38);}
.btn-back{padding:0 22px;height:46px;font-size:13.5px;font-weight:500;color:var(--text2);border:1px solid var(--line2);background:var(--surface);border-radius:24px;cursor:pointer;font-family:var(--font);text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .15s;}
.btn-back:hover{border-color:var(--text3);color:var(--text);}
.foot-brand{position:absolute;bottom:28px;display:flex;align-items:center;gap:7px;text-decoration:none;color:var(--text3);font-size:12px;font-weight:500;letter-spacing:.03em;transition:color .15s;}
.foot-brand:hover{color:var(--text2);}
.foot-mini-logo{width:20px;height:20px;border-radius:5px;background:linear-gradient(145deg,#0c6e82,#0891b2);display:flex;align-items:center;justify-content:center;}
.lang-corner{position:absolute;top:20px;right:24px;}
</style>
</head>
<body>
<div class="ambient"></div>
<div class="lang-corner">
  <div class="lang-toggle">
    <button class="lang-btn" data-lang="nl" onclick="atlasSetLang('nl')">NL</button>
    <button class="lang-btn" data-lang="en" onclick="atlasSetLang('en')">EN</button>
  </div>
</div>

<div class="logo-mark">
  <svg width="34" height="34" viewBox="0 0 44 44" fill="none">
    <circle cx="22" cy="22" r="14" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" fill="none"/>
    <ellipse cx="22" cy="22" rx="7" ry="14" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" fill="none"/>
    <line x1="8" y1="22" x2="36" y2="22" stroke="rgba(255,255,255,0.35)" stroke-width="1.8"/>
    <line x1="9.5" y1="15" x2="34.5" y2="15" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
    <line x1="9.5" y1="29" x2="34.5" y2="29" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
    <circle cx="22" cy="22" r="3.5" fill="white"/>
  </svg>
</div>

<div class="error-code">404</div>
<div class="error-title" data-i18n="p4.t">Pagina niet gevonden</div>
<p class="error-sub" data-i18n="p4.s">Deze pagina bestaat niet of is verplaatst. Misschien zat er een typfout in het adres, of is de link verlopen.</p>

<div class="actions">
  <a href="index.html" class="btn-home">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l7-7 7 7M5 7v10a1 1 0 001 1h3v-4h2v4h3a1 1 0 001-1V7"/></svg>
    <span data-i18n="p4.h">Naar de homepage</span>
  </a>
  <a href="app.html" class="btn-back" data-i18n="p4.d">Naar het dashboard</a>
</div>

<a href="index.html" class="foot-brand">
  <div class="foot-mini-logo">
    <svg width="12" height="12" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="13" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" fill="none"/>
      <ellipse cx="22" cy="22" rx="6.5" ry="13" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" fill="none"/>
      <line x1="9" y1="22" x2="35" y2="22" stroke="rgba(255,255,255,0.35)" stroke-width="1.8"/>
      <circle cx="22" cy="22" r="3" fill="white"/>
    </svg>
  </div>
  Atlas — Mapping your work
</a>
<script src="lang.js"></script>
</body>
</html>
